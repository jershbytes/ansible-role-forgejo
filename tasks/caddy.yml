---
- name: Install xcaddy build dependencies
  ansible.builtin.apt:
    name:
      - debian-keyring
      - debian-archive-keyring
      - apt-transport-https
      - curl
    state: present
    update_cache: true

- name: Download Go tarball
  ansible.builtin.get_url:
    url: "https://go.dev/dl/go{{ forgejo_go_version }}.linux-amd64.tar.gz"
    dest: /tmp/go{{ forgejo_go_version }}.linux-amd64.tar.gz
    mode: "0644"

- name: Remove existing Go installation
  ansible.builtin.file:
    path: /usr/local/go
    state: absent

- name: Extract Go
  ansible.builtin.unarchive:
    src: /tmp/go{{ forgejo_go_version }}.linux-amd64.tar.gz
    dest: /usr/local
    remote_src: true

- name: Install xcaddy
  ansible.builtin.command:
    cmd: /usr/local/go/bin/go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest
  environment:
    GOPATH: /opt/go
    GOBIN: /usr/local/bin
  creates: /usr/local/bin/xcaddy

- name: Build caddy with plugins via xcaddy
  ansible.builtin.command:
    cmd: >
      /usr/local/bin/xcaddy build
      {% for plugin in forgejo_caddy_xcaddy_plugins %}
      --with {{ plugin }}
      {% endfor %}
      --output /usr/local/bin/caddy
  environment:
    GOPATH: /opt/go
  creates: /usr/local/bin/caddy

- name: Set caddy binary capabilities
  community.general.capabilities:
    path: /usr/local/bin/caddy
    capability: cap_net_bind_service=+ep
    state: present

- name: Create caddy group
  ansible.builtin.group:
    name: caddy
    system: true
    state: present

- name: Create caddy user
  ansible.builtin.user:
    name: caddy
    group: caddy
    home: /var/lib/caddy
    shell: /usr/sbin/nologin
    system: true
    create_home: true
    state: present

- name: Create caddy config directory
  ansible.builtin.file:
    path: /etc/caddy
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    owner: root
    group: root
    mode: "0644"
  notify: Restart caddy

- name: Deploy caddy systemd service
  ansible.builtin.template:
    src: caddy.service.j2
    dest: /etc/systemd/system/caddy.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart caddy

- name: Enable and start caddy
  ansible.builtin.systemd:
    name: caddy
    enabled: true
    state: started
